name: CI/CD — CampusHub IA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Tests Backend ──────────────────────────────────────────────────────────
  test-backend:
    name: Tests Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Installer les dépendances
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Créer le .env de test
        working-directory: backend
        run: |
          echo "DATABASE_URL=sqlite+aiosqlite:///:memory:" >> .env
          echo "SECRET_KEY=test-secret-key-ci" >> .env
          echo "DEBUG=true" >> .env

      - name: Lancer les tests
        working-directory: backend
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ─── Lint Backend ───────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer ruff
        run: pip install ruff

      - name: Lint
        working-directory: backend
        run: ruff check . --ignore E501

  # ─── Tests Frontend ─────────────────────────────────────────────────────────
  test-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: Build de production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─── Docker Build (sur main seulement) ─────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: campushub-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: campushub-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
